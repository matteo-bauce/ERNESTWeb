name: Trigger CERN GitLab Sync

# Questo script parte in automatico ogni volta che fai "push" sul branch "main"
on:
  push:
    branches:
      - main 

jobs:
  ping_gitlab:
    runs-on: ubuntu-latest
    steps:
      - name: Richiesta di sincronizzazione API
        run: |
          curl --request POST \
               --header "PRIVATE-TOKEN: ${{ secrets.CERN_GITLAB_TOKEN }}" \
               "https://gitlab.cern.ch/api/v4/projects/232106/mirror/pull"
